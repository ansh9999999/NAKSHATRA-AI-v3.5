<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>NAKSHATRA AI Dashboard</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>🚀 NAKSHATRA AI Dashboard</h1>

<div class="cards">

    <div class="card">
        <h2>Total Trades</h2>
        <p id="total">0</p>
    </div>

    <div class="card">
        <h2>Wins</h2>
        <p id="wins">0</p>
    </div>

    <div class="card">
        <h2>Losses</h2>
        <p id="losses">0</p>
    </div>

    <div class="card">
        <h2>Open</h2>
        <p id="open">0</p>
    </div>

    <div class="card">
        <h2>Win Rate</h2>
        <p id="rate">0%</p>
    </div>

    <div class="card">
        <h2>Net PnL</h2>
        <p id="pnl">0</p>
    </div>

</div>

<h2>Recent Trades</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Symbol</th>
<th>Signal</th>
<th>Entry</th>
<th>PnL</th>
<th>Result</th>

</tr>

</thead>

<tbody id="tradeTable">

</tbody>

</table>

<script src="/static/app.js"></script>

</body>

</html>
